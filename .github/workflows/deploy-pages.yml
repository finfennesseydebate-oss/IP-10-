name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/improve-visual-scroll-9EowB"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
        enablement: true

      - name: Prepare site
        run: |
          mkdir _site
          cp the-moral-arc.html _site/index.html
          cp *.jpg _site/ 2>/dev/null || true
          cp wordcloud_data.json _site/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
